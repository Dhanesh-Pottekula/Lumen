<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430">
  <defs>
    <linearGradient id="stromaBand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#357a4e"/><stop offset="100%" stop-color="#245638"/>
    </linearGradient>
    <linearGradient id="memBand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a9668"/><stop offset="50%" stop-color="#3a7d54"/><stop offset="100%" stop-color="#2c6042"/>
    </linearGradient>
    <linearGradient id="lumenBand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b4a60"/><stop offset="100%" stop-color="#102c3c"/>
    </linearGradient>
    <linearGradient id="psComplex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6fc788"/><stop offset="100%" stop-color="#256b34"/>
    </linearGradient>
    <linearGradient id="etcComplex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5aa588"/><stop offset="100%" stop-color="#357a5e"/>
    </linearGradient>
    <linearGradient id="atpComplex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe08a"/><stop offset="100%" stop-color="#c8972f"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="920" height="150" fill="url(#stromaBand)"/>
  <rect x="0" y="150" width="920" height="100" fill="url(#memBand)"/>
  <rect x="0" y="250" width="920" height="180" fill="url(#lumenBand)"/>
  <!-- phospholipid bilayer: heads + tails -->
  <g opacity="0.5">
    <g fill="#bfe6c8">
      <circle cx="30" cy="158" r="4"/><circle cx="70" cy="158" r="4"/><circle cx="110" cy="158" r="4"/><circle cx="300" cy="158" r="4"/><circle cx="340" cy="158" r="4"/><circle cx="640" cy="158" r="4"/><circle cx="680" cy="158" r="4"/><circle cx="860" cy="158" r="4"/><circle cx="890" cy="158" r="4"/>
    </g>
    <g fill="#bfe6c8">
      <circle cx="30" cy="242" r="4"/><circle cx="70" cy="242" r="4"/><circle cx="110" cy="242" r="4"/><circle cx="300" cy="242" r="4"/><circle cx="340" cy="242" r="4"/><circle cx="640" cy="242" r="4"/><circle cx="680" cy="242" r="4"/><circle cx="860" cy="242" r="4"/><circle cx="890" cy="242" r="4"/>
    </g>
  </g>
  <!-- complexes with rim + sheen -->
  <g stroke="rgba(0,0,0,0.22)" stroke-width="1.5">
    <rect x="175" y="142" width="70" height="116" rx="14" fill="url(#psComplex)"/>
    <rect x="372" y="148" width="56" height="104" rx="12" fill="url(#etcComplex)"/>
    <rect x="535" y="142" width="70" height="116" rx="14" fill="url(#psComplex)"/>
    <rect x="730" y="140" width="60" height="120" rx="14" fill="url(#atpComplex)"/>
  </g>
  <g fill="#ffffff" opacity="0.22">
    <rect x="183" y="150" width="18" height="96" rx="9"/>
    <rect x="543" y="150" width="18" height="96" rx="9"/>
  </g>
  <circle cx="760" cy="134" r="17" fill="url(#atpComplex)" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
  <ellipse cx="754" cy="128" rx="6" ry="4" fill="#fff" opacity="0.5"/>
</svg>
